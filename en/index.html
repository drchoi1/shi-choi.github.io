<!DOCTYPE html>
<!-- force rebuild -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Save the Date</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="/assets/css/main.css">
  <noscript><link rel="stylesheet" href="/assets/css/noscript.css"></noscript>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #F3EEE6;
      font-family: "Cormorant Garamond", "Noto Serif KR", serif;
      color: #5A4638;
    }

    /* Desktop: sidebar takes space, content shifts right */
    #sidebar {
      width: 18em;
      background: #E7DED2 !important;
    }

    #sidebar nav a {
      color: #7A6250 !important;
      font-family: "Cormorant Garamond", serif;
      letter-spacing: 0.05em;
    }

    #sidebar nav a:hover {
      color: #5A4638 !important;
    }

    #wrapper {
      margin-left: 18em;
    }

    .wrapper.style1,
    .wrapper.style2,
    .wrapper.style3 {
      background: #F3EEE6 !important;
    }

    .language-selector {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000;
    }

    .language-selector select {
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 4px;
    }

    /* Save-the-date image */
    img {
      max-width: 90%;
      max-height: 90vh;
      height: auto;
      width: auto;
    }

    /* Mobile menu button */
    .menu-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10001;

      width: 42px;
      height: 42px;
      line-height: 42px;
      text-align: center;

      background: #ffffff;
      color: #333333;
      border: 1px solid #cccccc;
      border-radius: 50%;

      font-size: 24px;
      font-weight: normal;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    } 

    /* Mobile behavior */
    @media screen and (max-width: 980px) {
      .menu-toggle {
        display: block;
      }

      #sidebar {
        position: fixed !important;
        top: 0;
        left: 0;
        width: 18em;
        height: 100vh;
        transform: translateX(-100%) !important;
        transition: transform 0.3s ease;
        z-index: 10000;
      }

      body.sidebar-open #sidebar {
        transform: translateX(0) !important;
      }

      #wrapper {
        margin-left: 0;
      }
    }
  </style>
</head>

<body class="is-preload">
  <div class="menu-toggle" onclick="toggleMenu()" aria-label="Open menu">
    ☰
  </div>

  <div class="language-selector">
    <select onchange="location.href=this.value">
      <option value="/en/" selected>English</option>
      <option value="/ko/">한국어</option>
    </select>
  </div>

  <section id="sidebar">
    <div class="inner">

      <!--
      <div class="language-selector">
        <select onchange="location.href=this.value">
          <option value="/en/" selected>English</option>
          <option value="/ko/">한국어</option>
        </select>
      </div>
      -->
      
      <nav>
        <ul>
          <li><a href="#home">Homepage</a></li>
          <li><a href="#story">Our story</a></li>
          <li><a href="#rsvp">RSVP</a></li>
          <li><a href="#hotel">Mia Nha Trang (hotel booking)</a></li>
          <li><a href="#directions">How to get here</a></li>
          <li><a href="#registry">Registry</a></li>
        </ul>
      </nav>
    </div>
  </section>

  <div id="wrapper">

    <section id="home" class="wrapper style1 fullscreen fade-up">
      <div class="inner">
        <img src="/assets/images/STD_EN.png" alt="Save the Date" style="max-width: 90%; height: auto;">
      </div>
    </section>

    <section id="story" class="wrapper style2 fade-up">
      <div class="inner">
        <h2>Our story</h2>
        <p>Coming soon.</p>
      </div>
    </section>

    <section id="rsvp" class="wrapper style3 fade-up">
      <div class="inner">
        <h2>RSVP</h2>
        <p>Coming soon.</p>
      </div>
    </section>

    <section id="hotel" class="wrapper style2 fade-up">
      <div class="inner">
        <h2>Hotel booking</h2>
        <p>Coming soon.</p>
      </div>
    </section>

    <section id="directions" class="wrapper style3 fade-up">
      <div class="inner">
        <h2>How to get here</h2>
        <p>Coming soon.</p>
      </div>
    </section>

    <section id="registry" class="wrapper style1 fade-up">
      <div class="inner">
        <h2>Registry</h2>
        <p>Coming soon.</p>
      </div>
    </section>
    
  </div>

  <script src="/assets/js/jquery.min.js"></script>
  <script src="/assets/js/jquery.scrollex.min.js"></script>
  <script src="/assets/js/jquery.scrolly.min.js"></script>
  <script src="/assets/js/browser.min.js"></script>
  <script src="/assets/js/breakpoints.min.js"></script>
  <script src="/assets/js/util.js"></script>
  <script src="/assets/js/main.js"></script>

<script>
  function toggleMenu() {
    document.body.classList.toggle('sidebar-open');
  }
</script>


</body>
</html>
