<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Save the Date</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }

    .language-selector {
      position: fixed;
      top: 16px;
      right: 16px;
    }

    select {
      padding: 6px 10px;
      font-size: 14px;
    }

    img {
      max-width: 90%;
      max-height: 90vh;
      height: auto;
      width: auto;
    }
  </style>
</head>

<body>
  <div class="language-selector">
    <select onchange="location.href=this.value">
      <option value="/en/">English</option>
      <option value="/ko/" selected>한국어</option>
    </select>
  </div>

  <img src="/STD_KO" alt="Save the Date">
</body>
</html>
